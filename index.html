<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sky Climber: Neon Rush</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at center,#0f0f2b,#000);
  font-family:Arial, sans-serif;
  color:white;
}
canvas{display:block;}
#ui{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:16px;
  text-align:center;
}
#startScreen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.9);
}
button{
  padding:15px 40px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f0ff,#ff00ff);
  color:white;
  cursor:pointer;
}
button:hover{transform:scale(1.1);}
</style>
</head>
<body>

<div id="ui">
Score: <span id="score">0</span><br>
High Score: <span id="highScore">0</span><br>
Dash Cooldown: <span id="dashCD">Ready</span>
</div>

<div id="startScreen">
<h1>🌌 Sky Climber: Neon Rush</h1>
<p>← → Move | Space = Double Jump | SHIFT = DASH</p>
<button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player, platforms, lasers, powerups;
let keys={}, score, speed, gameRunning, difficultyTimer;
let highScore=localStorage.getItem("neonHighScore")||0;
document.getElementById("highScore").textContent=highScore;

document.addEventListener("keydown",e=>{
  if(e.code==="Space"&&player.jumpCount<2){
    player.dy=player.jump;
    player.jumpCount++;
  }

  if(e.code==="ShiftLeft" && player.dashCooldown<=0){
    activateDash();
  }

  keys[e.code]=true;
});
document.addEventListener("keyup",e=>keys[e.code]=false);

function activateDash(){
  player.dashing=15;
  player.invincible=15;
  player.dashCooldown=120;
}

function startGame(){
  document.getElementById("startScreen").style.display="none";
  resetGame();
  gameRunning=true;
  update();
}

function resetGame(){
  platforms=[]; lasers=[]; powerups=[];
  score=0; speed=1.5; difficultyTimer=0;

  player={
    x:canvas.width/2-15,
    y:canvas.height-150,
    size:30,
    dy:0,
    gravity:0.6,
    jump:-12,
    jumpCount:0,
    shield:false,
    slowTimer:0,
    megaJumpTimer:0,
    dashing:0,
    invincible:0,
    dashCooldown:0
  };

  platforms.push({
    x:canvas.width/2-80,
    y:canvas.height-100,
    w:160,h:15,move:false
  });

  for(let i=1;i<7;i++){
    platforms.push({
      x:Math.random()*(canvas.width-150),
      y:canvas.height-100-i*120,
      w:150,h:15,move:false
    });
  }
}

function spawnPlatform(){
  platforms.push({
    x:Math.random()*(canvas.width-120),
    y:-20,w:120,h:15,
    move:difficultyTimer>1500
  });
}

function spawnLaser(){
  lasers.push({
    x:Math.random()*canvas.width,
    y:-50,angle:0,length:150
  });
}

function update(){
if(!gameRunning)return;
ctx.clearRect(0,0,canvas.width,canvas.height);

difficultyTimer++;
if(difficultyTimer%600===0)speed+=0.3;

let gameSpeed=speed;

// Movement
if(keys["ArrowLeft"])player.x-=5;
if(keys["ArrowRight"])player.x+=5;

// DASH movement
if(player.dashing>0){
  player.x+= (keys["ArrowLeft"]?-15:15);
  player.dashing--;
}

player.dy+=player.gravity;
player.y+=player.dy;

if(player.x<0)player.x=0;
if(player.x>canvas.width-player.size)player.x=canvas.width-player.size;

// Platforms
platforms.forEach(p=>{
  p.y+=gameSpeed;
  if(p.move)p.x+=Math.sin(Date.now()/400)*1.5;

  ctx.fillStyle="#00f0ff";
  ctx.fillRect(p.x,p.y,p.w,p.h);

  if(player.x<p.x+p.w &&
     player.x+player.size>p.x &&
     player.y+player.size<p.y+15 &&
     player.y+player.size+player.dy>=p.y){
       player.dy=0;
       player.y=p.y-player.size;
       player.jumpCount=0;
  }
});

platforms=platforms.filter(p=>p.y<canvas.height+20);
if(platforms.length<8)spawnPlatform();

// Lasers
if(difficultyTimer>2000 && Math.random()<0.01)spawnLaser();

lasers.forEach(l=>{
  l.y+=gameSpeed;
  l.angle+=0.04;

  ctx.save();
  ctx.translate(l.x,l.y);
  ctx.rotate(l.angle);
  ctx.strokeStyle="#ff0055";
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(l.length,0);
  ctx.stroke();
  ctx.restore();

  if(Math.abs(player.x-l.x)<20 &&
     Math.abs(player.y-l.y)<20){
       if(player.invincible>0){
       }else if(player.shield){
         player.shield=false;
       }else{
         gameOver();
       }
  }
});

lasers=lasers.filter(l=>l.y<canvas.height+50);

// Timers
if(player.invincible>0)player.invincible--;
if(player.dashCooldown>0)player.dashCooldown--;

// Dash cooldown UI
document.getElementById("dashCD").textContent=
player.dashCooldown<=0?"Ready":Math.ceil(player.dashCooldown/60)+"s";

// Draw Player
ctx.fillStyle=player.invincible>0?"#ffffff":"#ff00ff";
ctx.shadowColor=ctx.fillStyle;
ctx.shadowBlur=20;
ctx.fillRect(player.x,player.y,player.size,player.size);
ctx.shadowBlur=0;

if(player.y>canvas.height)gameOver();

score++;
document.getElementById("score").textContent=score;

requestAnimationFrame(update);
}

function gameOver(){
gameRunning=false;

if(score>highScore){
  highScore=score;
  localStorage.setItem("neonHighScore",highScore);
}
document.getElementById("highScore").textContent=highScore;

document.getElementById("startScreen").style.display="flex";
document.querySelector("#startScreen h1").innerText="💀 You suck ";
document.querySelector("#startScreen p").innerText=
"Score: "+score+" | High Score: "+highScore;
}
</script>
</body>
</html>
